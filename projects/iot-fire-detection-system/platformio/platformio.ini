; PlatformIO project configuration
; Smart Fire Detection & Water Extinguishing System — ESP32
;
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor
; Wokwi:   build first, then start the Wokwi simulation (see wokwi.toml)

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

; Deep dependency finder so the Blynk library (used only inside
; blynk_manager) is resolved through the module headers.
lib_ldf_mode = deep+

lib_deps =
    blynkkk/blynk@^1.3.2
